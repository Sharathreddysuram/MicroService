server.port=8084

spring.application.name=API-GATEWAY

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.server.webmvc.routes[0].id=CUSTOMER-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://CUSTOMER-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/customers/**

spring.cloud.gateway.server.webmvc.routes[1].id=ACCOUNT-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/accounts/**

spring.cloud.gateway.server.webmvc.routes[3].id=TRANSACTION-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://TRANSACTION-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/transactions/**